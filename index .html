<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY UI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="super">

        <div id="notch"></div>

        <h1 id="h1">instagram login</h1>

        <input id="firstinput" type="text" placeholder="Enter your user id">
        <input id="secondinput" type="password" placeholder="Enter your password">

        <button id="btn"> Log in </button>

        <div id="keyword">

            <div class="kbd-row">
                <button>Q</button>
                <button>W</button>
                <button>E</button>
                <button>R</button>
                <button>T</button>
                <button>Y</button>
                <button>U</button>
                <button>V</button>
                <button>I</button>
                <button>O</button>
                <button>P</button>
            </div>

            <div class="kbd-row">
                <button>A</button>
                <button>S</button>
                <button>D</button>
                <button>F</button>
                <button>G</button>
                <button>H</button>
                <button>J</button>
                <button>C</button>
                <button>K</button>
                <button>L</button>
            </div>

            <div class="kbd-row">
                <div id="num">123</div>
                <button>Z</button>
                <button>X</button>
                 <div id="space">space</div>
                <button>B</button>
                <button>N</button>
                <button>M</button>
            </div>

        </div>
        <div id="fullScreen"></div>
    </div>

</body>

</html>
